name: Release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds a self-contained Windows app, packages it with Velopack, and
# publishes the installer + update feed to a GitHub Release for that tag.
# End users download Setup.exe from the release; the future in-app updater will
# read this same feed. Uses the built-in GITHUB_TOKEN - no secrets to configure.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for GITHUB_TOKEN to create the release

jobs:
  release:
    runs-on: windows-latest # WPF publish requires Windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Never ship a red tree: build + test before doing any packaging work.
      # CI already gates main, but a tag can be cut from any ref, and a release
      # publishes straight to users - so gate it here independently too.
      - name: Build and test
        run: |
          dotnet build -c Release
          dotnet test -c Release --no-build

      # Pin the vpk CLI to the same version as the Velopack NuGet package
      # (src/IRacingOverlay.App) - a mismatch between the two is unsupported.
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Derive version from tag
        shell: pwsh
        # refs/tags/v0.1.0 -> 0.1.0
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Building version $version"

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish src/IRacingOverlay.App/IRacingOverlay.App.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ env.VERSION }}
          -o publish

      # Pull existing releases so Velopack can build a delta against them.
      # Harmless (and expected to warn) on the very first release when the feed
      # is empty, so don't fail the run over it.
      - name: Download previous releases
        continue-on-error: true
        run: >
          vpk download github
          --repoUrl ${{ github.server_url }}/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}

      - name: Package with Velopack
        run: >
          vpk pack
          --packId IRacingOverlay
          --packVersion ${{ env.VERSION }}
          --packDir publish
          --mainExe IRacingOverlay.exe
          --packTitle "iRacing Overlay"
          --packAuthors "Kevin Bevan"
          --icon src/IRacingOverlay.App/Assets/app.ico

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl ${{ github.server_url }}/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "iRacing Overlay ${{ env.VERSION }}"
          --tag ${{ github.ref_name }}
